name: Deploy to WordPress.org

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - name: Get version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Deploying version: $VERSION"

      - name: Verify version matches plugin files
        run: |
          PLUGIN_VERSION=$(grep -m1 "Version:" native-custom-fields.php | sed -E 's/.*Version:[[:space:]]*//')
          STABLE_TAG=$(grep -m1 "^Stable tag:" readme.txt | sed -E 's/Stable tag:[[:space:]]*//')
          echo "Tag version:          ${{ env.VERSION }}"
          echo "Plugin header version: $PLUGIN_VERSION"
          echo "Readme stable tag:     $STABLE_TAG"
          if [ "$PLUGIN_VERSION" != "${{ env.VERSION }}" ] || [ "$STABLE_TAG" != "${{ env.VERSION }}" ]; then
            echo "::error::Version mismatch! Tag=${{ env.VERSION }}, Plugin header=$PLUGIN_VERSION, Stable tag=$STABLE_TAG"
            exit 1
          fi

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-plugins

      - name: Build deploy package
        run: |
          mkdir _deploy

          rsync -r \
            --exclude='.git' \
            --exclude='_deploy' \
            --exclude-from='.distignore' \
            ./ _deploy/

          echo "--- Deploy package contents ---"
          ls -la _deploy/
          echo "--- vendor/ ---"
          ls -la _deploy/vendor/
          echo "--- vendor/php-di/ ---"
          ls -la _deploy/vendor/php-di/ || { echo "::error::vendor/php-di missing!"; exit 1; }

          echo "Build OK — $(find _deploy/vendor -name '*.php' | wc -l) vendor PHP files"

      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          VERSION: ${{ env.VERSION }}
          BUILD_DIR: _deploy
